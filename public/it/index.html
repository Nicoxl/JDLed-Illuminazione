    <script>
    // 1. Inizializza subito le variabili essenziali per non perdere i dati
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V0NZSTZY12'); 

    // 2. Crea la funzione per caricare lo script esterno "pesante"
    function loadGTM() {
        var script = document.createElement('script');
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-V0NZSTZY12";
        script.async = true;
        document.head.appendChild(script);
    }

    // 3. Aspetta che l'utente faccia qualcosa (scroll, click, ecc.) prima di caricarlo
    const interactionEvents = ['scroll', 'mousemove', 'touchstart', 'keydown'];
    let isLoaded = false;

    interactionEvents.forEach(event => {
        window.addEventListener(event, () => {
            if (!isLoaded) {
                loadGTM();
                isLoaded = true;
            }
        }, { once: true, passive: true });
    });
    </script>
